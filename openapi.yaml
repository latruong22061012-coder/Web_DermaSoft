openapi: 3.0.3
info:
  title: DermaSoft API
  version: 1.0.0
  description: |
    OpenAPI 3.0 specification for DermaSoft Website API.

    Notes:
    - Standard envelope response: { status, message, data }
    - Primary authentication is PHP session cookie (PHPSESSID).
    - Login endpoints also return an integration token for Windows App.
    - Token is custom random token (not JWT/OAuth2).
servers:
  - url: http://localhost/DermaSoft/api
    description: Local XAMPP
  - url: /index.php?route=api
    description: Fallback route mode (without rewrite)
tags:
  - name: Auth
  - name: Profile
  - name: Booking
  - name: LichHen
  - name: PhieuKham
  - name: HoaDon
  - name: BenhNhan
  - name: ThanhVien
  - name: DanhGia
  - name: Admin
  - name: BacSi
  - name: LeTan
security:
  - sessionCookieAuth: []

paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Login with username/password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/LoginResponseData"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout current session
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user from session
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/register:
    post:
      tags: [Auth]
      summary: Register account (patient role)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201": { $ref: "#/components/responses/CreatedGeneric" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { $ref: "#/components/responses/Conflict" }

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Forgot password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /auth/change-password:
    post:
      tags: [Auth]
      summary: Change password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/first-login-update:
    post:
      tags: [Auth]
      summary: Update username/password at first login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FirstLoginUpdateRequest"
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /auth/verify-token:
    post:
      tags: [Auth]
      summary: Verify integration token for Windows App
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/check-phone:
    post:
      tags: [Auth]
      summary: Check if phone exists
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sodienthoai]
              properties:
                sodienthoai:
                  type: string
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }

  /auth/send-otp-login:
    post:
      tags: [Auth]
      summary: Send OTP for phone login (via email)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sodienthoai]
              properties:
                sodienthoai:
                  type: string
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }
        "429": { $ref: "#/components/responses/TooManyRequests" }

  /auth/login-with-otp:
    post:
      tags: [Auth]
      summary: Login with phone + OTP
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sodienthoai, otp]
              properties:
                sodienthoai:
                  type: string
                otp:
                  type: string
                  minLength: 6
                  maxLength: 6
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/TooManyRequests" }

  /auth/register-phone:
    post:
      tags: [Auth]
      summary: Register account by phone flow
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hoTen, sodienthoai, email, matkhau]
              properties:
                hoTen: { type: string }
                sodienthoai: { type: string }
                email: { type: string, format: email }
                matkhau: { type: string, minLength: 6 }
      responses:
        "201": { $ref: "#/components/responses/CreatedGeneric" }
        "409": { $ref: "#/components/responses/Conflict" }

  /auth/forgot-phone:
    post:
      tags: [Auth]
      summary: Recover phone by email
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }

  /auth/update-phone:
    post:
      tags: [Auth]
      summary: Update phone/email (authenticated)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sodienthoai_moi, email_moi, otp_confirm]
              properties:
                sodienthoai_moi: { type: string }
                email_moi: { type: string, format: email }
                otp_confirm: { type: string, minLength: 6, maxLength: 6 }
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/verify-email-token:
    post:
      tags: [Auth]
      summary: Verify email by token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token: { type: string }
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/send-otp-phone-reset:
    post:
      tags: [Auth]
      summary: Send OTP to reset phone (no login)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }
        "429": { $ref: "#/components/responses/TooManyRequests" }

  /auth/reset-phone-with-otp:
    post:
      tags: [Auth]
      summary: Reset phone using email OTP (no login)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, otp, phone_moi]
              properties:
                email: { type: string, format: email }
                otp: { type: string, minLength: 6, maxLength: 6 }
                phone_moi: { type: string }
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409": { $ref: "#/components/responses/Conflict" }

  /profile/update:
    post:
      tags: [Profile]
      summary: Update profile info
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hoTen, email]
              properties:
                hoTen: { type: string }
                email: { type: string, format: email }
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409": { $ref: "#/components/responses/Conflict" }

  /profile/upload-avatar:
    post:
      tags: [Profile]
      summary: Upload avatar
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [avatar]
              properties:
                avatar:
                  type: string
                  format: binary
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "413": { $ref: "#/components/responses/PayloadTooLarge" }

  /booking/create:
    post:
      tags: [Booking]
      summary: Create booking from website
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hoTen, soDienThoai, thoiGianHen]
              properties:
                hoTen: { type: string }
                soDienThoai: { type: string }
                thoiGianHen:
                  type: string
                  description: format YYYY-MM-DD HH:mm
                ghiChu: { type: string, nullable: true }
                maNguoiDung:
                  type: integer
                  description: Optional doctor id
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "429": { $ref: "#/components/responses/TooManyRequests" }

  /booking/doctors:
    get:
      tags: [Booking]
      summary: Get available doctors for booking UI
      security: []
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }

  /booking/slots:
    get:
      tags: [Booking]
      summary: Get booking slots
      security: []
      parameters:
        - name: ngay
          in: query
          required: true
          schema: { type: string, format: date }
        - name: maNguoiDung
          in: query
          required: true
          schema: { type: integer }
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }

  /lichhens:
    get:
      tags: [LichHen]
      summary: List appointments
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }
    post:
      tags: [LichHen]
      summary: Create appointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ma_benhnhan, ma_bacsi, thoigian_hen]
              properties:
                ma_benhnhan: { type: integer }
                ma_bacsi: { type: integer }
                thoigian_hen: { type: string }
                ghi_chu: { type: string }
      responses:
        "201": { $ref: "#/components/responses/CreatedGeneric" }

  /lichhens/{id}:
    get:
      tags: [LichHen]
      summary: Appointment detail
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }
    put:
      tags: [LichHen]
      summary: Update appointment
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }

  /lichhens/patient/{id}:
    get:
      tags: [LichHen]
      summary: Appointments by patient
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }

  /lichhens/status/{status}:
    get:
      tags: [LichHen]
      summary: Appointments by status (0-3)
      parameters:
        - name: status
          in: path
          required: true
          schema: { type: integer, enum: [0, 1, 2, 3] }
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }

  /lichhens/pending:
    get:
      tags: [LichHen]
      summary: Pending appointments
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }

  /lichhens/{id}/status:
    put:
      tags: [LichHen]
      summary: Update appointment status
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: integer
                  enum: [0, 1, 2, 3]
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }

  /lichhens/{id}/confirm:
    post:
      tags: [LichHen]
      summary: Confirm appointment
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }

  /lichhens/{id}/cancel:
    post:
      tags: [LichHen]
      summary: Cancel appointment
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }

  /phieukham:
    get:
      tags: [PhieuKham]
      summary: List consultation records
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }
    post:
      tags: [PhieuKham]
      summary: Create consultation record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ma_benhnhan, ma_lichhhen, ma_bacsi]
              properties:
                ma_benhnhan: { type: integer }
                ma_lichhhen: { type: integer }
                ma_bacsi: { type: integer }
      responses:
        "201": { $ref: "#/components/responses/CreatedGeneric" }

  /phieukham/{id}:
    get:
      tags: [PhieuKham]
      summary: Consultation record detail
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }
    put:
      tags: [PhieuKham]
      summary: Update consultation result
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                trieuchung: { type: string }
                chandoan: { type: string }
                ngayhen_taikham: { type: string, nullable: true }
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }

  /phieukham/patient/{id}:
    get:
      tags: [PhieuKham]
      summary: Records by patient
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }

  /phieukham/appointment/{id}:
    get:
      tags: [PhieuKham]
      summary: Record by appointment
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }

  /phieukham/{id}/services:
    get:
      tags: [PhieuKham]
      summary: Get services in record
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }
    put:
      tags: [PhieuKham]
      summary: Add services to record
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [services]
              properties:
                services:
                  type: array
                  items:
                    type: object
                    properties:
                      ma_dichvu: { type: integer }
                      soluong: { type: number }
                      thanhtien: { type: number }
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }

  /phieukham/{id}/medicines:
    get:
      tags: [PhieuKham]
      summary: Get medicines in record
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }

  /hoadon:
    get:
      tags: [HoaDon]
      summary: List invoices
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }
    post:
      tags: [HoaDon]
      summary: Create invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ma_phieukham, ma_benhnhan, ma_bacsi, tongtien]
              properties:
                ma_phieukham: { type: integer }
                ma_benhnhan: { type: integer }
                ma_bacsi: { type: integer }
                tongtien: { type: number }
                tienkhachtra: { type: number }
      responses:
        "201": { $ref: "#/components/responses/CreatedGeneric" }

  /hoadon/{id}:
    get:
      tags: [HoaDon]
      summary: Invoice detail
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }
    delete:
      tags: [HoaDon]
      summary: Delete invoice (admin)
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }

  /hoadon/patient/{id}:
    get:
      tags: [HoaDon]
      summary: Invoices by patient
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }

  /hoadon/unpaid:
    get:
      tags: [HoaDon]
      summary: Unpaid invoices
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }

  /hoadon/paid:
    get:
      tags: [HoaDon]
      summary: Paid invoices
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }

  /hoadon/{id}/payment:
    put:
      tags: [HoaDon]
      summary: Update invoice payment
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sotienphat]
              properties:
                sotienphat: { type: number }
                phuongthuc: { type: string }
                ghichu: { type: string }
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }

  /benhnhan:
    get:
      tags: [BenhNhan]
      summary: List patients
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }
    post:
      tags: [BenhNhan]
      summary: Create patient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hoten, ngaysinh, sodienthoai]
              properties:
                hoten: { type: string }
                ngaysinh: { type: string }
                gioitinh: { type: string }
                diachi: { type: string }
                sodienthoai: { type: string }
                email: { type: string, format: email }
      responses:
        "201": { $ref: "#/components/responses/CreatedGeneric" }

  /benhnhan/{id}:
    get:
      tags: [BenhNhan]
      summary: Patient detail
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }
    put:
      tags: [BenhNhan]
      summary: Update patient
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }
    delete:
      tags: [BenhNhan]
      summary: Delete patient (admin)
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }

  /benhnhan/search:
    get:
      tags: [BenhNhan]
      summary: Search patients
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string }
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }

  /benhnhan/phone/{phone}:
    get:
      tags: [BenhNhan]
      summary: Get patient by phone
      parameters:
        - name: phone
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }

  /thanh-vien:
    get:
      tags: [ThanhVien]
      summary: List member loyalty info
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }
    post:
      tags: [ThanhVien]
      summary: Create member loyalty record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ma_benhnhan]
              properties:
                ma_benhnhan: { type: integer }
      responses:
        "201": { $ref: "#/components/responses/CreatedGeneric" }

  /thanh-vien/{id}:
    get:
      tags: [ThanhVien]
      summary: Member detail
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }
    put:
      tags: [ThanhVien]
      summary: Update member
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }
    delete:
      tags: [ThanhVien]
      summary: Delete member (admin)
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }

  /thanh-vien/patient/{id}:
    get:
      tags: [ThanhVien]
      summary: Member by patient id
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }

  /thanh-vien/{id}/points:
    get:
      tags: [ThanhVien]
      summary: Get member points
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200": { $ref: "#/components/responses/OkGeneric" }
    put:
      tags: [ThanhVien]
      summary: Update member points
      parameters:
