components:
  securitySchemes:
    sessionCookieAuth:
      type: apiKey
      in: cookie
      name: PHPSESSID
      description: Primary auth in this system.
    bearerToken:
      type: http
      scheme: bearer
      bearerFormat: CustomToken
      description: Custom integration token from /auth/login (not JWT).

  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: integer
    Page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100

  schemas:
    ApiEnvelope:
      type: object
      required: [status, message, data]
      properties:
        status:
          type: integer
          example: 200
        message:
          type: string
          example: Thành công
        data:
          nullable: true

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 3
        password:
          type: string
          minLength: 6

    LoginResponseData:
      type: object
      properties:
        user:
          type: object
          properties:
            id: { type: integer }
            name: { type: string }
            username: { type: string }
            email: { type: string }
            phone: { type: string }
            role_id: { type: integer }
        token:
          type: string
          description: Custom token, not JWT.
        need_password_change:
          type: boolean

    RegisterRequest:
      type: object
      required: [hoten, sodienthoai, email, tendangnhap, matkhau]
      properties:
        hoten: { type: string }
        sodienthoai: { type: string }
        email: { type: string, format: email }
        tendangnhap: { type: string }
        matkhau: { type: string, minLength: 6 }

    ChangePasswordRequest:
      type: object
      required: [old_password, new_password]
      properties:
        old_password: { type: string, minLength: 6 }
        new_password: { type: string, minLength: 6 }

    FirstLoginUpdateRequest:
      type: object
      required: [current_password, new_username, new_password]
      properties:
        current_password: { type: string, minLength: 6 }
        new_username: { type: string, minLength: 3 }
        new_password: { type: string, minLength: 6 }

  responses:
    OkGeneric:
      description: Success
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiEnvelope"
    OkNoData:
      description: Success with no payload
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/ApiEnvelope"
              - type: object
                properties:
                  data:
                    nullable: true
                    example: null
    CreatedGeneric:
      description: Created
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiEnvelope"
    CreatedNoData:
      description: Created with no data
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/ApiEnvelope"
              - type: object
                properties:
                  data:
                    nullable: true
                    example: null
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiEnvelope"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiEnvelope"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiEnvelope"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiEnvelope"
    TooManyRequests:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiEnvelope"
    PayloadTooLarge:
      description: Payload too large
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiEnvelope"
